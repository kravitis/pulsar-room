<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsar Music Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .player-container { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #1db954; margin-bottom: 5px; }
        #current-track { font-size: 14px; color: #b3b3b3; margin-bottom: 20px; }
        audio { width: 100%; margin-bottom: 20px; }
        .playlist { text-align: left; max-height: 250px; overflow-y: auto; border-top: 1px solid #333; padding-top: 15px; }
        .track-item { padding: 10px; border-radius: 5px; cursor: pointer; transition: background 0.2s; font-size: 14px; }
        .track-item:hover { background: #2a2a2a; }
        .track-item.active { color: #1db954; font-weight: bold; background: #282828; }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Pulsar Band Αρχείο</h2>
    <div id="current-track">Φόρτωση κομματιών...</div>
    <audio id="audio-player" controls></audio>
    <div class="playlist" id="playlist"></div>
</div>

<script>
    const audioPlayer = document.getElementById('audio-player');
    const playlistContainer = document.getElementById('playlist');
    const currentTrackText = document.getElementById('current-track');
    
    let songs = [];
    let currentTrackIndex = 0;

    // Διαβάζει το αυτόματο αρχείο playlist.json
    async function initPlayer() {
        try {
            const response = await fetch('playlist.json');
            const fileNames = await response.json();
            
            songs = fileNames.map(fileName => ({
                name: fileName.replace('.mp3', ''),
                url: `songs/${fileName}`
            }));

            if (songs.length > 0) {
                renderPlaylist();
                loadTrack(0, false);
            } else {
                currentTrackText.innerText = "Ο φάκελος songs είναι άδειος.";
            }
        } catch (e) {
            currentTrackText.innerText = "Σφάλμα φόρτωσης λίστας.";
        }
    }

    function renderPlaylist() {
        playlistContainer.innerHTML = '';
        songs.forEach((song, index) => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.id = `track-${index}`;
            div.innerText = `${index + 1}. ${song.name}`;
            div.onclick = () => loadTrack(index, true);
            playlistContainer.appendChild(div);
        });
    }

    function loadTrack(index, shouldPlay) {
        document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
        currentTrackIndex = index;
        audioPlayer.src = songs[currentTrackIndex].url;
        currentTrackText.innerText = songs[currentTrackIndex].name;
        document.getElementById(`track-${index}`).classList.add('active');
        if (shouldPlay) audioPlayer.play();
    }

    audioPlayer.addEventListener('ended', () => {
        loadTrack((currentTrackIndex + 1) % songs.length, true);
    });

    initPlayer();
</script>
</body>
</html>
